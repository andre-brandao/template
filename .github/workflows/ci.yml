name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test:ci
      - name: Publish test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: "**/junit.xml"
          check_name: Test report
          include_passed: true
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit
          path: "**/junit.xml"
          if-no-files-found: warn

  fallow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - uses: fallow-rs/fallow@v3
        with:
          format: sarif
          comment: true
          review-comments: true
          review-guidance: true
          max-annotations: 100
          score: true
          # fail-on-issues: false

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: fallow-results.sarif
          category: fallow

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint:ci

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - name: Trivy scan (SARIF report, all severities)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
      - name: Trivy gate (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
          skip-setup-trivy: true

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: dashboard
            adapter: node
          - app: dashboard
            adapter: bun
          - app: dashboard
            adapter: cloudflare
          - app: dashboard
            adapter: sst-aws
          - app: cli
    name: build (${{ matrix.app }}${{ matrix.adapter && format(' · {0}', matrix.adapter) }})
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build ${{ matrix.app }}
        working-directory: apps/${{ matrix.app }}
        env:
          SVELTE_ADAPTER: ${{ matrix.adapter }}
        run: bun run build

  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Cache the browser binaries (keyed on the lockfile, which pins the Playwright
      # version). On a hit we skip the ~hundreds-of-MB download and only install the
      # OS libs (apt packages, which live outside the cached dir).
      - uses: actions/cache@v4
        id: browsers
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install Playwright browsers
        if: steps.browsers.outputs.cache-hit != 'true'
        working-directory: apps/dashboard
        run: bunx playwright install --with-deps
      - name: Install Playwright OS deps
        if: steps.browsers.outputs.cache-hit == 'true'
        working-directory: apps/dashboard
        run: bunx playwright install-deps
      - name: Run e2e
        run: bun run --filter dashboard test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/dashboard/e2e/playwright-report
          if-no-files-found: warn
          retention-days: 30

  report:
    runs-on: ubuntu-latest
    needs: [typecheck, test, fallow, lint, format, trivy, build, e2e]
    if: always()
    permissions:
      contents: read
      actions: read
    steps:
      - name: Summarize results
        uses: actions/github-script@v7
        with:
          script: |
            // The needs context has no timing, so read per-job durations from the run's jobs API.
            const res = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const jobs = res.data.jobs.filter((j) => j.name !== context.job);
            const dur = (s, e) => {
              const secs = Math.round((Date.parse(e) - Date.parse(s)) / 1000);
              return `${Math.floor(secs / 60)}m ${secs % 60}s`;
            };
            const icon = (c) =>
              ({ success: "✅", skipped: "⏭️", cancelled: "🚫" })[c] ?? "❌";
            const done = jobs.filter((j) => j.started_at && j.completed_at);
            const total = done.length
              ? Math.round(
                  (Math.max(...done.map((j) => Date.parse(j.completed_at))) -
                    Math.min(...done.map((j) => Date.parse(j.started_at)))) / 1000,
                )
              : 0;
            const fail = jobs.some(
              (j) => j.conclusion !== "success" && j.conclusion !== "skipped",
            );
            core.summary
              .addHeading("CI summary", 2)
              .addTable([
                ["Job", "Result", "Duration"].map((data) => ({ data, header: true })),
                ...jobs.map((j) => [
                  j.name,
                  `${icon(j.conclusion)} ${j.conclusion ?? "running"}`,
                  j.started_at && j.completed_at ? dur(j.started_at, j.completed_at) : "—",
                ]),
              ])
              .addRaw(`**Total:** ${Math.floor(total / 60)}m ${total % 60}s`);
            if (fail) {
              core.summary.addRaw("\n\n> One or more jobs failed.");
              core.setFailed("One or more jobs failed.");
            }
            await core.summary.write();
