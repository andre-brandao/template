name: Deploy
run-name: "Deploy ${{ github.event_name == 'pull_request' && format(' #{0}', github.event.pull_request.number) || github.ref_name }}"

on:
  push:
    branches:
      - prod
      - dev
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - dev

concurrency:
  group: sst-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      STAGE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/cache@v5
        with:
          path: |
            .sst
          key: ${{ runner.os }}-sst

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v1
        with:
          node-version: "24"

      - name: deps
        run: bun install --frozen-lockfile

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
          PLANETSCALE_SERVICE_TOKEN_ID: ${{ secrets.PLANETSCALE_SERVICE_TOKEN_ID }}
          PLANETSCALE_SERVICE_TOKEN: ${{ secrets.PLANETSCALE_SERVICE_TOKEN }}
        run: |
          bunx sst install
          bunx sst deploy --stage=${{ env.STAGE }}

      - name: Comment preview
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const outputs = fs.existsSync('.sst/outputs.json')
              ? JSON.parse(fs.readFileSync('.sst/outputs.json', 'utf8'))
              : {};
            const rows = Object.entries(outputs)
              .filter(([, v]) => typeof v === 'string' && v)
              .map(([k, v]) => `| \`${k}\` | ${/^https?:\/\//.test(v) ? v : `https://${v}`} |`);
            const body = [
              '<!-- deploy:sst -->',
              '## SST preview deployed',
              '',
              `**Stage:** \`${process.env.STAGE}\``,
              '',
              ...(rows.length ? ['| Output | URL |', '| --- | --- |', ...rows] : ['_No outputs._']),
            ].join('\n');
            await require('./.github/comment.js')({ github, context, body });

  # Only ever removes ephemeral `pr-<number>` stages — never prod/dev.
  remove:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      STAGE: pr-${{ github.event.pull_request.number }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v1
        with:
          node-version: "24"

      - name: deps
        run: bun install --frozen-lockfile

      - name: Remove
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
          PLANETSCALE_SERVICE_TOKEN_ID: ${{ secrets.PLANETSCALE_SERVICE_TOKEN_ID }}
          PLANETSCALE_SERVICE_TOKEN: ${{ secrets.PLANETSCALE_SERVICE_TOKEN }}
        run: |
          bunx sst install
          bunx sst remove --stage=${{ env.STAGE }}

      - name: Comment removed
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const stage = process.env.STAGE;
            const body = [
              '<!-- deploy:sst -->',
              '## ⚠️ Preview environment removed',
              '',
              `The SST stage \`${stage}\` was torn down because this PR is closed.`,
              '',
              'If anything is left over, remove it manually:',
              '',
              '```sh',
              `bunx sst remove --stage=${stage}`,
              '```',
            ].join('\n');
            await require('./.github/comment.js')({ github, context, body });
