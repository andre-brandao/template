name: Destroy Deploy
run-name: "Destroy Deploy #${{ github.event.pull_request.number }}"

on:
  pull_request:
    types: [closed]
    branches:
      - dev

concurrency:
  group: ${{ github.ref }}

jobs:
  remove:
    runs-on: ubuntu-latest
    env:
      STAGE: pr-${{ github.event.pull_request.number }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v1
        with:
          node-version: "2"

      - name: deps
        run: bun install --frozen-lockfile

      # - uses: developing-software/agents/actions/event/init@dev
      #   with:
      #     token: ${{ secrets.AGENTS_TOKEN }}
      #     type: deploy.remove
      #     tags: |
      #       env:${{ env.STAGE }}
      #       tool:sst
      #       gh:branch:${{ github.event.pull_request.head.ref }}
      #       gh:base:${{ github.event.pull_request.base.ref }}
      #     data: >-
      #       {"stage":"${{ env.STAGE }}","tool":"sst"}

      # - name: Attach PR data
      #   uses: developing-software/agents/actions/event/data@dev
      #   with:
      #     key: pr
      #     data: |
      #       {
      #         "number": ${{ github.event.pull_request.number }},
      #         "title": ${{ toJSON(github.event.pull_request.title) }},
      #         "author": "${{ github.event.pull_request.user.login }}",
      #         "headRef": "${{ github.event.pull_request.head.ref }}",
      #         "baseRef": "${{ github.event.pull_request.base.ref }}",
      #         "headSha": "${{ github.event.pull_request.head.sha }}",
      #         "url": "${{ github.event.pull_request.html_url }}"
      #       }

      - name: Delete deploy preview comment
        if: success()
        uses: actions/github-script@v7
        env:
          TOOL: sst
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tool = process.env.TOOL;
            const marker = `<!-- deploy:${tool} -->`;
            const stage = process.env.STAGE;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const existing = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const found = existing.find(c => c.body && c.body.includes(marker));
            if (found) {
              const lines = [
                marker,
                `Deploy preview for ${tool} is being removed...`,
                '',
                `**Stage**: ${stage}`
              ]
              const body = lines.join('\n');
              await github.rest.issues.updateComment({ owner, repo, comment_id: found.id, body });
              // await github.rest.issues.deleteComment({ owner, repo, comment_id: found.id });
              core.info(`Updated deploy preview comment ${found.id}`);
            } else {
              core.info('No deploy preview comment found — nothing to delete.');
            }

      - name: Remove
        id: remove
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
          PLANETSCALE_SERVICE_TOKEN_ID: ${{ secrets.PLANETSCALE_SERVICE_TOKEN_ID }}
          PLANETSCALE_SERVICE_TOKEN: ${{ secrets.PLANETSCALE_SERVICE_TOKEN }}
        run: |
          bunx sst install
          bunx sst remove --stage=${{ env.STAGE }}

      - name: Delete deploy preview comment
        if: success()
        uses: actions/github-script@v7
        env:
          TOOL: sst
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tool = process.env.TOOL;
            const marker = `<!-- deploy:${tool} -->`;
            const stage = process.env.STAGE;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const existing = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const found = existing.find(c => c.body && c.body.includes(marker));
            if (found) {
              const lines = [
                marker,
                `Deploy preview for ${stage} was destroyed at ${new Date().toISOString()}`,
              ]
              const body = lines.join('\n');
              await github.rest.issues.updateComment({ owner, repo, comment_id: found.id, body });
              // await github.rest.issues.deleteComment({ owner, repo, comment_id: found.id });
              core.info(`Deleted deploy preview comment ${found.id}`);
            } else {
              core.info('No deploy preview comment found — nothing to delete.');
            }
